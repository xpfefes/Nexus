<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISS Tracker | EriK x NASA Tribute</title>
  
  <!-- Leaflet CSS (SRI protected) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="anonymous"/>

  <style>
    :root {
      --bg-deep: #050608;
      --bg-panel: rgba(12, 15, 20, 0.85);
      --accent-cyan: #00f3ff;
      --accent-blue: #0077b6;
      --text-primary: #e0e6ed;
      --text-muted: #8b9bb4;
      --border-glow: rgba(0, 243, 255, 0.3);
      --font-main: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-deep);
      color: var(--text-primary);
      font-family: var(--font-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    header {
      background: linear-gradient(90deg, #0a0c10 0%, #11141c 100%);
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid var(--border-glow);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
    }
    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    header .badge {
      font-size: 0.75rem;
      background: var(--accent-blue);
      color: #fff;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Main Layout */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 320px;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
      background: #080a0e;
    }

    /* Info Panel */
    #info-panel {
      background: var(--bg-panel);
      backdrop-filter: blur(12px);
      border-left: 1px solid var(--border-glow);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      z-index: 999;
    }
    .panel-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      color: var(--accent-cyan);
      letter-spacing: 1.5px;
      margin-bottom: 0.5rem;
    }
    .data-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .data-label { color: var(--text-muted); font-size: 0.9rem; }
    .data-value { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 1.05rem; font-weight: 500; }
    
    #status {
      margin-top: auto;
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    #status::before {
      content: "";
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #00ff88;
      box-shadow: 0 0 6px #00ff88;
    }
    #status.error::before { background: #ff4757; box-shadow: 0 0 6px #ff4757; }

    /* Responsive */
    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
      #info-panel {
        border-left: none;
        border-top: 1px solid var(--border-glow);
        flex-direction: row;
        flex-wrap: wrap;
        padding: 1rem;
        gap: 1rem;
      }
      .data-row { flex: 1 1 45%; border-bottom: none; }
      #status { width: 100%; margin-top: 0.5rem; }
    }

    /* Leaflet overrides for dark theme */
    .leaflet-control-attribution { background: rgba(0,0,0,0.6) !important; color: #888 !important; }
    .leaflet-control-attribution a { color: var(--accent-cyan) !important; }
  </style>
</head>
<body>

  <header>
    <h1>🛰️ ISS Real-Time Tracker</h1>
    <span class="badge">EriK 3.8.6 x NASA</span>
  </header>

  <main>
    <div id="map"></div>
    <aside id="info-panel">
      <div class="panel-title">Telemetry Stream</div>
      
      <div class="data-row">
        <span class="data-label">Latitude</span>
        <span class="data-value" id="lat">--.----</span>
      </div>
      <div class="data-row">
        <span class="data-label">Longitude</span>
        <span class="data-value" id="lon">--.----</span>
      </div>
      <div class="data-row">
        <span class="data-label">Next Update</span>
        <span class="data-value" id="timer">5.0s</span>
      </div>

      <div id="status">Acquiring signal...</div>
    </aside>
  </main>

  <!-- Leaflet JS (SRI protected) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin="anonymous"></script>

  <script>
    /**
     * ISS Tracker Module
     * Runtime: ES6+ | Browser: Modern Chromium/Firefox/Safari
     * Dependencies: Leaflet 1.9.4
     */
    (function() {
      'use strict';

      // Configuration
      const CONFIG = {
        apiEndpoint: 'https://api.open-notify.org/iss-now.json',
        updateIntervalMs: 5000,
        mapCenter: [20, 0],
        mapZoom: 2,
        tileUrl: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
        tileAttribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a>'
      };

      // State
      const state = {
        map: null,
        marker: null,
        updateTimerId: null,
        countdownTimerId: null,
        nextUpdateTimestamp: 0,
        consecutiveErrors: 0,
        isInitialized: false
      };

      // DOM References
      const dom = {
        lat: document.getElementById('lat'),
        lon: document.getElementById('lon'),
        timer: document.getElementById('timer'),
        status: document.getElementById('status')
      };

      /**
       * Initialize Leaflet map and UI bindings
       */
      function initMap() {
        state.map = L.map('map', {
          center: CONFIG.mapCenter,
          zoom: CONFIG.mapZoom,
          zoomControl: false,
          attributionControl: true
        });

        L.control.zoom({ position: 'bottomright' }).addTo(state.map);

        L.tileLayer(CONFIG.tileUrl, {
          attribution: CONFIG.tileAttribution,
          maxZoom: 19,
          subdomains: 'abcd'
        }).addTo(state.map);

        // Custom ISS marker icon (SVG data URI for zero external deps)
        const issIcon = L.divIcon({
          className: 'iss-marker',
          html: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                   <circle cx="12" cy="12" r="6" fill="#00f3ff" opacity="0.3"/>
                   <circle cx="12" cy="12" r="3" fill="#00f3ff"/>
                   <path d="M12 2v4M12 18v4M2 12h4M18 12h4" stroke="#00f3ff" stroke-width="1.5"/>
                 </svg>`,
          iconSize: [24, 24],
          iconAnchor: [12, 12]
        });

        state.marker = L.marker([0, 0], { icon: issIcon }).addTo(state.map);
      }

      /**
       * Fetch ISS position, validate, and update state/UI
       */
      async function fetchPosition() {
        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 4000); // 4s network timeout

          const response = await fetch(CONFIG.apiEndpoint, { signal: controller.signal });
          clearTimeout(timeoutId);

          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          
          const data = await response.json();
          if (data.message !== 'success') throw new Error('API returned non-success message');

          const lat = parseFloat(data.iss_position.latitude);
          const lon = parseFloat(data.iss_position.longitude);

          if (isNaN(lat) || isNaN(lon)) throw new Error('Invalid coordinates received');

          // Update marker & map view (smooth pan only on first load to preserve UX)
          state.marker.setLatLng([lat, lon]);
          if (!state.isInitialized) {
            state.map.setView([lat, lon], CONFIG.mapZoom, { animate: true });
            state.isInitialized = true;
          }

          // Update UI
          dom.lat.textContent = lat.toFixed(4);
          dom.lon.textContent = lon.toFixed(4);
          dom.status.textContent = 'Signal locked';
          dom.status.classList.remove('error');

          // Reset error counter & schedule next update
          state.consecutiveErrors = 0;
          scheduleNextUpdate();

        } catch (err) {
          handleError(err);
        }
      }

      /**
       * Handle network/API failures gracefully
       */
      function handleError(err) {
        state.consecutiveErrors++;
        dom.status.textContent = `Signal lost (${err.message || 'Timeout'})`;
        dom.status.classList.add('error');
        
        // Exponential backoff cap at 30s to avoid hammering a down API
        const backoffMs = Math.min(CONFIG.updateIntervalMs * Math.pow(2, state.consecutiveErrors - 1), 30000);
        clearTimeout(state.updateTimerId);
        state.updateTimerId = setTimeout(fetchPosition, backoffMs);
        
        // Keep countdown running but show retry state
        state.nextUpdateTimestamp = Date.now() + backoffMs;
      }

      /**
       * Schedule the next API poll and reset countdown target
       */
      function scheduleNextUpdate() {
        clearTimeout(state.updateTimerId);
        state.nextUpdateTimestamp = Date.now() + CONFIG.updateIntervalMs;
        state.updateTimerId = setTimeout(fetchPosition, CONFIG.updateIntervalMs);
      }

      /**
       * High-precision countdown updater (runs every 100ms for smooth UI)
       */
      function updateCountdown() {
        if (!state.nextUpdateTimestamp) return;
        const remaining = Math.max(0, state.nextUpdateTimestamp - Date.now());
        dom.timer.textContent = (remaining / 1000).toFixed(1) + 's';
      }

      /**
       * Cleanup intervals on page unload to prevent memory leaks
       */
      function cleanup() {
        clearTimeout(state.updateTimerId);
        clearInterval(state.countdownTimerId);
      }

      /**
       * Bootstrap sequence
       */
      function bootstrap() {
        initMap();
        state.countdownTimerId = setInterval(updateCountdown, 100);
        fetchPosition(); // Initial fetch
        window.addEventListener('beforeunload', cleanup);
      }

      // Defer init until DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', bootstrap);
      } else {
        bootstrap();
      }
    })();
  </script>
</body>
</html>
