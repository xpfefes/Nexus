<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Security Dashboard - Gemini 3.1 Flash-Lite</title>
    <style>
        :root {
            --bg-dark: #000814;
            --panel-dark: #001d3d;
            --accent-blue: #0078d4;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --danger: #ff4d4d;
            --success: #00f2a1;
            --border: #1e3a8a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            background: var(--panel-dark);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid var(--border);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 5px;
        }

        .shield-icon {
            width: 45px;
            height: 45px;
            color: var(--accent-blue);
        }

        h1 {
            font-size: 32px;
            font-weight: 300;
            margin: 0;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 15px;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        /* Statistiche Dashboard */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid var(--accent-blue);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 600;
            display: block;
            margin-top: 8px;
        }

        /* Area Input */
        .config-area {
            background: rgba(0,0,0,0.2);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-dim);
        }

        input[type="password"], input[type="text"] {
            width: 100%;
            background: #000814;
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }

        input[type="file"] {
            color: var(--text-dim);
        }

        .btn-scan {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .btn-scan:hover { background: #005a9e; box-shadow: 0 0 15px rgba(0,120,212,0.4); }
        .btn-scan:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Log e Report */
        #log-console {
            display: none;
            background: #000;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Consolas', monospace;
            margin-top: 20px;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #333;
        }

        .log-line { font-size: 13px; margin-bottom: 5px; border-bottom: 1px solid #111; }
        .log-time { color: var(--accent-blue); }

        #report-result {
            display: none;
            margin-top: 40px;
            padding: 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            line-height: 1.8;
            border: 1px solid var(--border);
        }

        .threat-txt { color: var(--danger); font-weight: bold; }
        .safe-txt { color: var(--success); font-weight: bold; }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin-right: 15px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <svg class="shield-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        <h1>AI Deep Scan Terminal</h1>
    </div>
    <div class="subtitle">Analisi euristica avanzata con Gemini 3.1 Flash-Lite</div>

    <div class="stats-row">
        <div class="stat-card">
            <span class="stat-label">Security Status</span>
            <span class="stat-value" id="status-display">Ready</span>
        </div>
        <div class="stat-card">
            <span class="stat-row-item">
                <span class="stat-label">Minacce</span>
                <span class="stat-value" id="threat-val">0</span>
            </span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Tempo Analisi</span>
            <span class="stat-value" id="timer-val">0.00s</span>
        </div>
    </div>

    <div class="config-area">
        <div class="input-group">
            <label>API KEY PERSONALE (Google AI Studio)</label>
            <input type="password" id="api-key-input" placeholder="Inserisci la tua API Key...">
        </div>

        <div class="input-group">
            <label>FILE O SCREENSHOT PER ANALISI AVANZATA (Codice, Testi, Errori)</label>
            <input type="file" id="files-input" multiple>
        </div>

        <button class="btn-scan" id="run-btn" onclick="executeScan()">INIZIA SCANSIONE SISTEMA</button>
    </div>

    <div id="log-console"></div>

    <div id="report-result">
        <div id="report-body"></div>
    </div>
</div>

<script>
    function addLog(text) {
        const console = document.getElementById('log-console');
        console.style.display = 'block';
        const time = new Date().toLocaleTimeString();
        console.innerHTML += `<div class="log-line"><span class="log-time">[${time}]</span> ${text}</div>`;
        console.scrollTop = console.scrollHeight;
    }

    async function toBase64(file) {
        return new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = () => res({ mimeType: file.type, data: r.result.split(',')[1] });
            r.onerror = rej;
            r.readAsDataURL(file);
        });
    }

    async function executeScan() {
        const apiKey = document.getElementById('api-key-input').value.trim();
        const fileBox = document.getElementById('files-input');
        const btn = document.getElementById('run-btn');

        if (!apiKey) {
            alert("ERRORE: Inserisci la tua API Key per procedere.");
            return;
        }

        btn.disabled = true;
        document.getElementById('report-result').style.display = 'none';
        document.getElementById('log-console').innerHTML = '';
        document.getElementById('status-display').innerText = "Scanning...";
        
        const startTime = Date.now();
        addLog("Inizializzazione sessione Gemini 3.1 Flash-Lite...");

        try {
            const parts = [{ text: `SYSTEM_PROMPT: Sei un Antivirus basato su AI. Il tuo obiettivo è analizzare i file (codice, log, testi) o le immagini caricate per identificare virus, malware o script malevoli.
            
            VINCOLI:
            1. Non puoi vedere le firme digitali dei file.
            2. Analizza il codice sorgente o il comportamento descritto per trovare minacce.
            3. Allega foto per analisi avanzata se presenti (es. screenshot di codice).
            4. Report in ITALIANO formale.
            
            FLAG OBBLIGATORIO: Alla fine del report scrivi esattamente '[ESITO_VIRUS: SI]' se è un virus, o '[ESITO_VIRUS: NO]' se è sicuro.` }];

            if (fileBox.files.length > 0) {
                addLog(`Preparazione di ${fileBox.files.length} oggetti per l'analisi multimodale...`);
                for (let f of fileBox.files) {
                    if (f.type.startsWith('image/')) {
                        const b64 = await toBase64(f);
                        parts.push({ inlineData: b64 });
                        addLog(`Immagine ${f.name} caricata correttamente.`);
                    } else {
                        parts.push({ text: `Analisi testo file: ${f.name} - Contenuto parziale o metadati inclusi per scansione.` });
                        addLog(`Analisi logica del file ${f.name} avviata.`);
                    }
                }
            }

            addLog("Invio dati al Neural Core...");
            // Modello aggiornato a Gemini 3.1 Flash-Lite
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${apiKey}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts }] })
            });

            const result = await response.json();
            if (!response.ok) throw new Error(result.error.message);

            const aiText = result.candidates[0].content.parts[0].text;
            const hasVirus = aiText.includes('[ESITO_VIRUS: SI]');
            const cleanOutput = aiText.replace(/\[ESITO_VIRUS:\s*(SI|NO)\]/gi, '').trim();

            // Calcolo tempo finale
            const finalTime = ((Date.now() - startTime) / 1000).toFixed(2);
            document.getElementById('timer-val').innerText = finalTime + "s";

            const reportArea = document.getElementById('report-result');
            reportArea.style.display = 'block';
            document.getElementById('report-body').innerHTML = `<h2 style="margin-top:0">Esito Scansione AI</h2><div style="white-space: pre-wrap;">${cleanOutput}</div>`;

            if (hasVirus) {
                document.getElementById('threat-val').innerHTML = `<span class="threat-txt">1 MINACCIA</span>`;
                document.getElementById('status-display').innerHTML = `<span class="threat-txt">PERICOLO</span>`;
                addLog("!! MINACCIA RILEVATA !!");
            } else {
                document.getElementById('threat-val').innerHTML = `<span class="safe-txt">0</span>`;
                document.getElementById('status-display').innerHTML = `<span class="safe-txt">SICURO</span>`;
                addLog("Nessuna minaccia identificata.");
            }

        } catch (e) {
            addLog(`<span style="color:red">ERRORE API: ${e.message}</span>`);
            document.getElementById('status-display').innerText = "Errore";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
