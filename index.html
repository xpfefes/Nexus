<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Security Dashboard - Dark Edition</title>
    <style>
        :root {
            --bg-dark: #000b18;
            --panel-dark: #00162d;
            --accent-blue: #0078d4;
            --text-main: #ffffff;
            --text-dim: #a0aec0;
            --danger: #ff4d4d;
            --success: #00f2a1;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 1400px;
            background: var(--panel-dark);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #1a365d;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .shield-icon {
            width: 40px;
            height: 40px;
            color: var(--accent-blue);
        }

        h1 {
            font-size: 28px;
            font-weight: 300;
            margin: 0;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 600;
            margin-top: 5px;
        }

        /* Pannello Configurazione */
        .config-panel {
            background: rgba(0,0,0,0.2);
            padding: 25px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-blue);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dim);
        }

        input[type="text"], 
        input[type="password"], 
        input[type="file"] {
            width: 100%;
            background: #002244;
            border: 1px solid #1a365d;
            padding: 12px;
            border-radius: 5px;
            color: white;
            box-sizing: border-box;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px 25px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-scan {
            background: var(--accent-blue);
            color: white;
            flex-grow: 1;
        }

        .btn-scan:hover { background: #005a9e; }
        .btn-scan:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Status & Logs */
        #status-area {
            display: none;
            margin-top: 30px;
            background: #000;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Consolas', monospace;
        }

        .log-entry { font-size: 13px; margin: 4px 0; border-bottom: 1px solid #111; padding-bottom: 2px; }
        .log-time { color: var(--accent-blue); margin-right: 10px; }

        #report-area {
            display: none;
            margin-top: 30px;
            padding: 25px;
            background: #f8fafc10;
            border-radius: 8px;
            line-height: 1.6;
        }

        .threat-found { color: var(--danger); }
        .system-safe { color: var(--success); }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--accent-blue);
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <svg class="shield-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        <h1>AI Neural Antivirus</h1>
    </div>
    <div class="subtitle">Scansione euristica avanzata basata su Intelligenza Artificiale Multimodale.</div>

    <div class="stats-grid">
        <div class="stat-item">
            <span class="stat-label">Stato Sistema</span>
            <span class="stat-value" id="sys-status">In attesa</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Minacce</span>
            <span class="stat-value" id="threats-count">0 rilevate</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Tempo Scansione</span>
            <span class="stat-value" id="scan-time">0.0s</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Oggetti Analizzati</span>
            <span class="stat-value" id="files-count">0 file</span>
        </div>
    </div>

    <div class="config-panel">
        <div class="input-group">
            <label>CHIAVE API GOOGLE AI STUDIO (Necessaria)</label>
            <input type="password" id="api-key" placeholder="Incolla qui la tua API Key personale...">
        </div>
        
        <div class="input-group">
            <label>CARICA FILE O IMMAGINI PER ANALISI AVANZATA</label>
            <input type="file" id="file-upload" multiple>
        </div>

        <div class="btn-group">
            <button class="btn-scan" id="scan-btn" onclick="startScan()">AVVIA SCANSIONE PROFONDA</button>
        </div>
    </div>

    <div id="status-area">
        <div style="margin-bottom:15px; font-weight:bold;">
            <span class="spinner"></span> CORE AI: Elaborazione in corso...
        </div>
        <div id="logs"></div>
    </div>

    <div id="report-area">
        <div id="report-content"></div>
    </div>
</div>

<script>
    function log(msg) {
        const logs = document.getElementById('logs');
        const time = new Date().toLocaleTimeString();
        logs.innerHTML += `<div class="log-entry"><span class="log-time">[${time}]</span> ${msg}</div>`;
        logs.scrollTop = logs.scrollHeight;
    }

    async function fileToB64(file) {
        return new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = () => res({ mimeType: file.type, data: r.result.split(',')[1] });
            r.onerror = rej;
            r.readAsDataURL(file);
        });
    }

    async function startScan() {
        const apiKey = document.getElementById('api-key').value.trim();
        const fileInput = document.getElementById('file-upload');
        const btn = document.getElementById('scan-btn');

        if (!apiKey) {
            alert("ERRORE: Inserisci la tua API Key personale per procedere. Non è possibile usare una chiave di default per motivi di sicurezza.");
            return;
        }

        // Setup UI
        btn.disabled = true;
        document.getElementById('status-area').style.display = 'block';
        document.getElementById('report-area').style.display = 'none';
        document.getElementById('logs').innerHTML = '';
        
        const startTime = Date.now();
        log("Inizializzazione motore neurale...");
        
        try {
            const parts = [{ text: `OBIETTIVO: Sei un sistema di sicurezza avanzato. Analizza il codice o i file forniti per identificare potenziali virus, malware o comportamenti sospetti.
            
NOTE TECNICHE:
1. NON puoi verificare le firme digitali (digital signatures).
2. Usa le immagini caricate per un'analisi visiva di eventuali screenshot di errori, codice o anomalie.
3. Il tuo report deve essere in italiano, tecnico ma chiaro.

REGOLE DI USCITA (Flag di sistema):
Alla fine del report scrivi ESATTAMENTE '[ESITO_VIRUS: SI]' se rilevi una minaccia, oppure '[ESITO_VIRUS: NO]' se il file è pulito.` }];

            if (fileInput.files.length > 0) {
                log(`Caricamento di ${fileInput.files.length} elementi nel buffer...`);
                for (let f of fileInput.files) {
                    if (f.type.startsWith('image/')) {
                        const b64 = await fileToB64(f);
                        parts.push({ inlineData: b64 });
                        log(`Immagine ${f.name} analizzata visivamente.`);
                    } else {
                        parts.push({ text: `Analisi metadati file: ${f.name} (${f.size} bytes)` });
                        log(`File ${f.name} aggiunto alla coda di analisi codice.`);
                    }
                }
            }

            log("Connessione ai cluster Gemini 3.1 Flash...");
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-Flash-Lite:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts }] })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error.message);

            const rawText = data.candidates[0].content.parts[0].text;
            const isThreat = rawText.includes('[ESITO_VIRUS: SI]');
            const cleanText = rawText.replace(/\[ESITO_VIRUS:\s*(SI|NO)\]/gi, '').trim();

            // Calcolo tempo e UI finale
            const duration = ((Date.now() - startTime) / 1000).toFixed(2);
            document.getElementById('scan-time').innerText = duration + "s";
            document.getElementById('files-count').innerText = fileInput.files.length + " oggetti";
            
            const reportDiv = document.getElementById('report-area');
            reportDiv.style.display = 'block';
            document.getElementById('report-content').innerHTML = `<h3>Report di Analisi</h3><div style="white-space: pre-wrap;">${cleanText}</div>`;

            if (isThreat) {
                document.getElementById('threats-count').innerHTML = `<span class="threat-found">1 MINACCIA RILEVATA</span>`;
                document.getElementById('sys-status').innerHTML = `<span class="threat-found">PERICOLO</span>`;
            } else {
                document.getElementById('threats-count').innerHTML = `<span class="system-safe">0 minacce</span>`;
                document.getElementById('sys-status').innerHTML = `<span class="system-safe">PROTETTO</span>`;
            }

            log("Scansione completata con successo.");

        } catch (err) {
            log(`<span style="color:red">ERRORE CRITICO: ${err.message}</span>`);
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
